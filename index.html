<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jogo da Cobrinha</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="menu">
    <h1>🐍 Jogo da Cobrinha</h1>
    <input type="text" id="playerName" placeholder="Digite seu nome" />
    <button id="startBtn">Iniciar Jogo</button>

    <div id="audioControls">
      <button id="prevTrackBtn">◀️ Anterior</button>
      <button id="playPauseBtn">⏸️ Pausar</button>
      <button id="muteBtn">🔈 Mutar</button>
      <button id="nextTrackBtn">▶️ Próximo</button>
      <label for="volumeControl">Volume:</label>
      <input type="range" id="volumeControl" min="0" max="1" step="0.01" value="0.5">
    </div>
  </div>

  <div id="gameContainer" style="display: none;">
    <div id="scoreboard">
      <h2>🏆 Placar</h2>
      <ul id="scoreList"></ul> <!-- Adicionado -->
    </div>

    <div id="gameArea">
      <h2>Jogador: <span id="displayName"></span></h2>
      <canvas id="game" width="400" height="400"></canvas>
      <p>Pontuação: <span id="score">0</span></p>

      <div id="mobileControls" class="show">
      <div class="mobile-row top">
      <button id="upBtn">↑</button>
    </div>
    <div class="mobile-row middle">
    <button id="leftBtn">←</button>
    <button id="downBtn">↓</button>
    <button id="rightBtn">→</button>
    </div>
  </div>
    </div>
  </div>

  <!-- gameOverScreen que estava faltando -->
  <div id="gameOverScreen" style="display: none;">
    <h2>💀 Fim de jogo!</h2>
    <p>Sua pontuação: <span id="finalScore"></span></p>
    <button id="backToMenuBtn">Voltar ao Menu</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
